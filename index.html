<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cluj Complaints Explorer</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.6.1/ol.css" />
  <script src="https://cdn.jsdelivr.net/npm/ol@v10.6.1/dist/ol.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121936;
      --panel-2: #0f1530;
      --border: #26315d;
      --text: #e9edff;
      --muted: #9eabd8;
      --accent: #7aa2ff;
      --accent-2: #59d0a7;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 14px;
      padding: 14px;
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .main {
      min-width: 0;
      display: flex;
    }

    .map-wrap {
      position: relative;
      flex: 1 1 auto;
      height: calc(100vh - 28px);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #d8d8d8;
    }

    .ol-popup {
      position: absolute;
      background: rgba(11, 16, 32, 0.96);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      min-width: 260px;
      max-width: 320px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .ol-popup:after {
      content: "";
      position: absolute;
      left: 24px;
      bottom: -10px;
      border-width: 10px 10px 0 10px;
      border-style: solid;
      border-color: rgba(11, 16, 32, 0.96) transparent transparent transparent;
    }

    .popup-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .popup-subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .popup-list {
      display: grid;
      gap: 6px;
    }

    .popup-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      font-size: 0.9rem;
      align-items: center;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 0.96rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    label, .muted {
      color: var(--muted);
    }

    .section {
      padding: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      border-radius: var(--radius);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .kpi {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .kpi .label { font-size: 0.8rem; color: var(--muted); }
    .kpi .value { font-size: 1.45rem; font-weight: 800; margin-top: 4px; }

    select, input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0c1230;
      color: var(--text);
      outline: none;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    button {
      border: 1px solid var(--border);
      background: #16214a;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover { background: #1d2b61; }
    button.active { background: var(--accent); color: #08101e; border-color: transparent; }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stats-list, .legend-list {
      display: grid;
      gap: 4px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .stat-row:last-child { border-bottom: 0; }

    .bar {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 5px;
    }

    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .legend-title {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .map-legend {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 30;
      width: 320px;
      max-height: 60%;
      overflow: auto;
      background: rgba(11, 16, 32, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .map-legend.hidden {
      display: none;
    }

    .map-legend-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .map-legend-toggle {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 31;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      flex: none;
    }

    .timeline-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 118px;
      margin-top: 8px;
      overflow: hidden;
      padding-bottom: 2px;
      justify-content: space-between;
    }

    .timeline-month {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1 1 0;
      min-width: 0;
    }

    .timeline-stack {
      width: 100%;
      max-width: 13px;
      height: 92px;
      display: flex;
      flex-direction: column-reverse;
      border-radius: 4px 4px 0 0;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .timeline-segment {
      width: 100%;
      min-height: 1px;
    }

    .timeline-month span {
      font-size: 0.58rem;
      color: var(--muted);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      line-height: 1;
      user-select: none;
    }

    @media (max-width: 1100px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
      .sidebar { max-height: none; }
      .map-wrap { height: 60vh; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <section class="section">
      <h2>Mod vizualizare</h2>
      <div class="btn-row">
        <button class="view-btn active" data-view="clusters">Clusters</button>
        <button class="view-btn" data-view="heatmap">Heatmap</button>
        <button class="view-btn" data-view="cartiere">Cartiere</button>
      </div>
    </section>

    <section class="section">
      <h2>Filtre</h2>
      <div style="display:grid; gap:10px;">
        <div>
          <label for="categoryFilter">Sesizări</label>
          <select id="categoryFilter">
            <option value="__all__">Toate sesizările</option>
          </select>
        </div>
        <div class="grid-2">
          <div>
            <label for="fromDate">De la</label>
            <input id="fromDate" type="date" />
          </div>
          <div>
            <label for="toDate">Până la</label>
            <input id="toDate" type="date" />
          </div>
        </div>
        <div>
          <label for="timeSlider">Luna</label>
          <input id="timeSlider" type="range" min="0" max="0" value="0" />
          <div id="timeLabel" class="muted" style="margin-top:6px;">Toate lunile din intervalul selectat</div>
        </div>
        <div class="btn-row">
          <button id="playBtn">Play</button>
          <button id="resetTimelineBtn">Reset timeline</button>
          <button id="fitBtn">Fit la datele vizibile</button>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Activitate lunară</h2>
      <div id="timelineChart" class="timeline-chart"></div>
    </section>

    <section class="section">
      <h2>Overview</h2>
      <div class="kpi-grid">
        <div class="kpi">
          <div class="label">Sesizări</div>
          <div class="value" id="visibleCount">0</div>
        </div>
        <div class="kpi">
          <div class="label">Categorii</div>
          <div class="value" id="visibleCategories">0</div>
        </div>
        <div class="kpi">
          <div class="label">Luni</div>
          <div class="value" id="visibleMonths">0</div>
        </div>
        <div class="kpi">
          <div class="label">Cartiere</div>
          <div class="value" id="visibleNeighborhoods">0</div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Număr de sesizări</h2>
      <div id="categoryStats" class="stats-list"></div>
    </section>
  </aside>

  <main class="main">
    <section class="map-wrap">
      <div id="map"></div>
      <div id="popup" class="ol-popup" style="display:none;"></div>
      <button id="legendToggleBtn" class="map-legend-toggle">Ascunde legenda</button>
      <div id="mapLegend" class="map-legend">
        <div class="map-legend-head">
          <h2 style="margin:0;">Legendă</h2>
        </div>
        <div id="legendList" class="legend-list"></div>
      </div>
    </section>
  </main>

  <script>
    const CATEGORY_COLORS = [
      '#e63946', '#f1fa8c', '#2a9d8f', '#457b9d', '#ffb703', '#8ecae6',
      '#fb8500', '#90be6d', '#b5179e', '#7209b7', '#06d6a0', '#ef476f'
    ];

    const CHOROPLETH_RAMP = [
      'rgba(0, 200, 0, 0.25)',
      'rgba(173, 255, 47, 0.25)',
      'rgba(255, 215, 0, 0.25)',
      'rgba(255, 140, 0, 0.25)',
      'rgba(220, 20, 60, 0.25)'
    ];

    let rawRecords = [];
    let filteredFeatures = [];
    let availableMonths = [];
    let currentMonthIndex = -1;
    let currentViewMode = 'clusters';
    let playTimer = null;
    let sortedCategories = [];
    let neighborhoodNames = [];
    let neighborhoodStatsMap = new Map();
    let selectedNeighborhoodName = null;

    const basemapLayer = new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: 'https://{a-d}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
      })
    });

    const neighborhoodSource = new ol.source.Vector();
    const visibleSource = new ol.source.Vector();
    const clusterSource = new ol.source.Cluster({ distance: 40, source: visibleSource });

    const popupEl = document.getElementById('popup');
    const popupOverlay = new ol.Overlay({
      element: popupEl,
      positioning: 'bottom-left',
      offset: [12, -12],
      stopEvent: false
    });

    const heatmapLayer = new ol.layer.Heatmap({
      source: visibleSource,
      blur: 28,
      radius: 12,
      weight: feature => feature.get('heatWeight') || 0.5,
      visible: false,
      opacity: 0.95,
      gradient: ['#000004', '#1b0c41', '#4f0c6b', '#781c6d', '#a52c60', '#cf4446', '#ed6925', '#fb9b06', '#f7d13d', '#fcfdbf'],
      zIndex: 10
    });

    const neighborhoodOutlineLayer = new ol.layer.Vector({
      source: neighborhoodSource,
      style: neighborhoodOutlineStyle,
      visible: true,
      zIndex: 12
    });

    const choroplethLayer = new ol.layer.Vector({
      source: neighborhoodSource,
      style: choroplethStyleFunction,
      visible: false,
      zIndex: 13
    });

    const clustersLayer = new ol.layer.Vector({
      source: clusterSource,
      style: clusterStyleFunction,
      visible: true,
      zIndex: 20
    });

    const map = new ol.Map({
      target: 'map',
      layers: [basemapLayer, heatmapLayer, choroplethLayer, neighborhoodOutlineLayer, clustersLayer],
      overlays: [popupOverlay],
      view: new ol.View({
        center: ol.proj.fromLonLat([23.59, 46.77]),
        zoom: 12
      }),
      controls: ol.control.defaults.defaults({ attributionOptions: { collapsible: true } })
    });

    const els = {
      categoryFilter: document.getElementById('categoryFilter'),
      fromDate: document.getElementById('fromDate'),
      toDate: document.getElementById('toDate'),
      timeSlider: document.getElementById('timeSlider'),
      timeLabel: document.getElementById('timeLabel'),
      playBtn: document.getElementById('playBtn'),
      resetTimelineBtn: document.getElementById('resetTimelineBtn'),
      fitBtn: document.getElementById('fitBtn'),
      visibleCount: document.getElementById('visibleCount'),
      visibleCategories: document.getElementById('visibleCategories'),
      visibleMonths: document.getElementById('visibleMonths'),
      visibleNeighborhoods: document.getElementById('visibleNeighborhoods'),
      categoryStats: document.getElementById('categoryStats'),
      timelineChart: document.getElementById('timelineChart'),
      legendList: document.getElementById('legendList'),
      mapLegend: document.getElementById('mapLegend'),
      legendToggleBtn: document.getElementById('legendToggleBtn')
    };

    function parseDateFlexible(value) {
      if (!value) return null;
      if (value instanceof Date) return value;
      const str = String(value).trim();
      const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2})(?::(\d{2}))?)?$/);
      if (m) return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]), Number(m[4] || 0), Number(m[5] || 0), Number(m[6] || 0));
      const d = new Date(str);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function toISODate(date) {
      return date ? new Date(date.getTime() - date.getTimezoneOffset() * 60000).toISOString().slice(0, 10) : '';
    }

    function monthKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    function monthLabel(key) {
      const [y, m] = key.split('-').map(Number);
      return new Date(y, m - 1, 1).toLocaleString('ro', { month: 'short', year: 'numeric' });
    }

    function getNeighborhoodName(obj) {
      return obj.cartiere || obj.cartier || obj.name || obj.NAME || obj.den || obj.DENUMIRE || obj.nume || obj.NUME || null;
    }

    function normalizeRecord(record) {
      if (!record) return null;
      const lat = Number(record.latitude ?? record.lat ?? record.y);
      const lon = Number(record.longitude ?? record.lng ?? record.lon ?? record.x);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
      const created = parseDateFlexible(record.createdon || record.date || record.datetime || record.created_at);
      const category = (record.titlu || record.category || 'Unknown').trim?.() || 'Unknown';
      const cartiere = record.cartiere ?? record.cartier ?? 'N/A';
      return {
        ...record,
        latitude: lat,
        longitude: lon,
        category,
        cartiere,
        createdon: record.createdon || record.date || '',
        createdDate: created,
        monthKey: created ? monthKey(created) : 'Unknown'
      };
    }

    function getUnique(arr) {
      return [...new Set(arr.filter(Boolean))];
    }

    function categoryColor(category) {
      const idx = Math.max(0, sortedCategories.indexOf(category));
      return CATEGORY_COLORS[idx % CATEGORY_COLORS.length];
    }

    function neighborhoodOutlineStyle(feature) {
      const props = feature.getProperties();
      const label = getNeighborhoodName(props) || '';
      const selected = selectedNeighborhoodName && selectedNeighborhoodName === label;
      return new ol.style.Style({
        stroke: new ol.style.Stroke({ color: 'rgba(0, 0, 0, 0.95)', width: selected ? 4 : 3, lineDash: [12, 8] }),
        fill: null,
        text: label ? new ol.style.Text({
          text: String(label),
          font: '600 12px Inter, sans-serif',
          fill: new ol.style.Fill({ color: 'rgba(0, 0, 0, 0.95)' }),
          stroke: new ol.style.Stroke({ color: 'rgba(255,255,255,0.95)', width: 3 }),
          overflow: true,
          placement: 'point'
        }) : undefined
      });
    }

    function computeNeighborhoodFeatureValues() {
      return neighborhoodSource.getFeatures().map(f => f.get('issueCount') || 0).filter(v => v > 0);
    }

    function computeQuantileBreaks(values) {
      const sorted = [...values].sort((a, b) => a - b);
      if (!sorted.length) return [0, 0, 0, 0];
      return [
        sorted[Math.floor((sorted.length - 1) * 0.2)] || 0,
        sorted[Math.floor((sorted.length - 1) * 0.4)] || 0,
        sorted[Math.floor((sorted.length - 1) * 0.6)] || 0,
        sorted[Math.floor((sorted.length - 1) * 0.8)] || 0
      ];
    }

    function classifyCount(value, values) {
      if (!values.length || value <= 0) return CHOROPLETH_RAMP[0];
      const [q1, q2, q3, q4] = computeQuantileBreaks(values);
      if (value <= q1) return CHOROPLETH_RAMP[0];
      if (value <= q2) return CHOROPLETH_RAMP[1];
      if (value <= q3) return CHOROPLETH_RAMP[2];
      if (value <= q4) return CHOROPLETH_RAMP[3];
      return CHOROPLETH_RAMP[4];
    }

    function choroplethStyleFunction(feature) {
      const props = feature.getProperties();
      const neighborhood = getNeighborhoodName(props);
      const values = computeNeighborhoodFeatureValues();
      const count = feature.get('issueCount') || 0;
      const selected = selectedNeighborhoodName && selectedNeighborhoodName === neighborhood;
      const fillColor = neighborhood ? classifyCount(count, values) : 'rgba(255,255,255,0.02)';
      const labelText = neighborhood ? `${neighborhood}\n${count}` : String(count);

      return new ol.style.Style({
        stroke: new ol.style.Stroke({ color: 'rgba(0, 0, 0, 0.95)', width: selected ? 4 : 3, lineDash: [12, 8] }),
        fill: new ol.style.Fill({ color: fillColor }),
        text: new ol.style.Text({
          text: labelText,
          font: '600 12px Inter, sans-serif',
          fill: new ol.style.Fill({ color: 'rgba(0, 0, 0, 0.95)' }),
          stroke: new ol.style.Stroke({ color: 'rgba(255,255,255,0.95)', width: 3 }),
          overflow: true,
          placement: 'point',
          textAlign: 'center',
          justify: 'center'
        })
      });
    }

    const clusterStyleCache = {};
    function clusterStyleFunction(feature) {
      const members = feature.get('features') || [];
      const size = members.length;
      const activeCategory = els.categoryFilter.value;
      let color;

      if (activeCategory && activeCategory !== '__all__') {
        color = categoryColor(activeCategory);
      } else {
        const counts = new Map();
        for (const f of members) {
          const cat = f.get('category') || 'Unknown';
          counts.set(cat, (counts.get(cat) || 0) + 1);
        }
        let dominantCategory = 'Unknown';
        let dominantCount = 0;
        for (const [cat, count] of counts.entries()) {
          if (count > dominantCount) {
            dominantCategory = cat;
            dominantCount = count;
          }
        }
        color = categoryColor(dominantCategory);
      }

      const key = `${size}|${color}|${activeCategory}`;
      if (!clusterStyleCache[key]) {
        const radius = Math.max(12, Math.min(30, 10 + Math.log2(size + 1) * 5));
        clusterStyleCache[key] = new ol.style.Style({
          image: new ol.style.Circle({
            radius,
            fill: new ol.style.Fill({ color }),
            stroke: new ol.style.Stroke({ color: 'rgba(255,255,255,0.95)', width: 2 })
          }),
          text: new ol.style.Text({
            text: String(size),
            fill: new ol.style.Fill({ color: '#08101e' }),
            font: '700 13px Inter, sans-serif'
          })
        });
      }
      return clusterStyleCache[key];
    }

    function makeFeature(record) {
      const feature = new ol.Feature({
        geometry: new ol.geom.Point(ol.proj.fromLonLat([record.longitude, record.latitude])),
        ...record
      });
      feature.set('heatWeight', 0.7);
      feature.set('category', record.category);
      return feature;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatPopup(neighborhood) {
      const stats = neighborhoodStatsMap.get(neighborhood);
      if (!stats) return '';
      const topFive = [...stats.categories.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);
      const rows = topFive.map(([cat, count]) => `<div class="popup-row"><span>${escapeHtml(cat)}</span><strong>${count}</strong></div>`).join('');
      return `
        <div class="popup-title">${escapeHtml(neighborhood)}</div>
        <div class="popup-subtitle">${stats.count} sesizări</div>
        <div class="popup-list">${rows || '<div class="muted">Fără categorii disponibile.</div>'}</div>
      `;
    }

    function closePopup() {
      popupEl.style.display = 'none';
      popupOverlay.setPosition(undefined);
      selectedNeighborhoodName = null;
      neighborhoodOutlineLayer.changed();
      choroplethLayer.changed();
    }

    function populateFilters() {
      sortedCategories = getUnique(rawRecords.map(r => r.category)).sort((a, b) => a.localeCompare(b));
      els.categoryFilter.innerHTML = '<option value="__all__">Toate sesizările</option>' + sortedCategories.map(v => `<option>${escapeHtml(v)}</option>`).join('');
      const dated = rawRecords.filter(r => r.createdDate).sort((a, b) => a.createdDate - b.createdDate);
      if (dated.length) {
        els.fromDate.value = toISODate(dated[0].createdDate);
        els.toDate.value = toISODate(dated[dated.length - 1].createdDate);
      }
      availableMonths = getUnique(rawRecords.filter(r => r.createdDate).map(r => r.monthKey)).sort();
      els.timeSlider.min = 0;
      els.timeSlider.max = String(Math.max(0, availableMonths.length - 1));
      els.timeSlider.value = '0';
      currentMonthIndex = -1;
      updateTimeLabel();
    }

    function renderLegend() {
      els.legendList.innerHTML = '';

      if (currentViewMode === 'cartiere') {
        const values = computeNeighborhoodFeatureValues();
        const [q1, q2, q3, q4] = computeQuantileBreaks(values);
        const ranges = [
          `0 – ${q1}`,
          `${q1 + 1} – ${q2}`,
          `${q2 + 1} – ${q3}`,
          `${q3 + 1} – ${q4}`,
          `${q4 + 1}+`
        ];

        const title = document.createElement('div');
        title.className = 'legend-title';
        title.textContent = 'Număr sesizări / cartier';
        els.legendList.appendChild(title);

        CHOROPLETH_RAMP.forEach((color, idx) => {
          const row = document.createElement('div');
          row.className = 'legend-item';
          row.innerHTML = `<span class="swatch" style="background:${color}"></span><span>${ranges[idx]}</span>`;
          els.legendList.appendChild(row);
        });
        return;
      }

      sortedCategories.forEach(cat => {
        const row = document.createElement('div');
        row.className = 'legend-item';
        row.innerHTML = `<span class="swatch" style="background:${categoryColor(cat)}"></span><span>${escapeHtml(cat)}</span>`;
        els.legendList.appendChild(row);
      });

      if (currentViewMode === 'heatmap') {
        const heatRow = document.createElement('div');
        heatRow.className = 'legend-item';
        heatRow.style.marginTop = '6px';
        heatRow.innerHTML = `<span class="swatch" style="background:#cf4446"></span><span>Intensitate heatmap</span>`;
        els.legendList.appendChild(heatRow);
      }
    }

    function filterRecords() {
      const category = els.categoryFilter.value;
      const fromDate = els.fromDate.value ? new Date(els.fromDate.value + 'T00:00:00') : null;
      const toDate = els.toDate.value ? new Date(els.toDate.value + 'T23:59:59') : null;
      const maxMonth = currentMonthIndex >= 0 ? availableMonths[currentMonthIndex] : null;
      return rawRecords.filter(r => {
        if (category !== '__all__' && r.category !== category) return false;
        if (fromDate && (!r.createdDate || r.createdDate < fromDate)) return false;
        if (toDate && (!r.createdDate || r.createdDate > toDate)) return false;
        if (maxMonth && r.monthKey > maxMonth) return false;
        return true;
      });
    }

    function applyNeighborhoodStats(records) {
      const valid = records.filter(r => {
        const n = (r.cartiere || '').trim();
        return n && n !== 'N/A';
      });
      const statMap = new Map();
      valid.forEach(r => {
        const n = r.cartiere.trim();
        if (!statMap.has(n)) statMap.set(n, { count: 0, categories: new Map() });
        const s = statMap.get(n);
        s.count += 1;
        s.categories.set(r.category, (s.categories.get(r.category) || 0) + 1);
      });
      neighborhoodStatsMap = statMap;
      neighborhoodNames = [...statMap.keys()].sort((a, b) => a.localeCompare(b));

      neighborhoodSource.getFeatures().forEach(feature => {
        const n = getNeighborhoodName(feature.getProperties());
        const stat = n ? statMap.get(n) : null;
        feature.set('issueCount', stat?.count || 0);
      });
    }

    function refreshMapData() {
      const records = filterRecords();
      filteredFeatures = records.map(makeFeature);
      visibleSource.clear();
      visibleSource.addFeatures(filteredFeatures);
      applyNeighborhoodStats(records);
      Object.keys(clusterStyleCache).forEach(k => delete clusterStyleCache[k]);
      clustersLayer.changed();
      choroplethLayer.changed();
      neighborhoodOutlineLayer.changed();
      renderLegend();
      updateDashboard();
      if (selectedNeighborhoodName && !neighborhoodStatsMap.has(selectedNeighborhoodName)) {
        closePopup();
      }
      setTimeout(() => map.updateSize(), 0);
    }

    function renderStats(records, key, container, maxRows) {
      container.innerHTML = '';
      const counts = new Map();
      records.forEach(r => counts.set(r[key], (counts.get(r[key]) || 0) + 1));
      const arr = [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, maxRows);
      const total = records.length || 1;
      if (!arr.length) {
        container.innerHTML = '<div class="muted">Nu există date vizibile.</div>';
        return;
      }
      arr.forEach(([label, value]) => {
        const div = document.createElement('div');
        div.className = 'stat-row';
        const pct = (value / total) * 100;
        div.innerHTML = `<div><div>${escapeHtml(String(label || 'Unknown'))}</div><div class="bar"><span style="width:${pct}%"></span></div></div><div>${value}</div>`;
        container.appendChild(div);
      });
    }

    function renderTimeline(records) {
      const monthMap = new Map();
      records.filter(r => r.createdDate).forEach(r => {
        if (!monthMap.has(r.monthKey)) monthMap.set(r.monthKey, new Map());
        const byCat = monthMap.get(r.monthKey);
        byCat.set(r.category, (byCat.get(r.category) || 0) + 1);
      });
      const months = availableMonths.length ? availableMonths : [...monthMap.keys()].sort();
      const maxMonthTotal = Math.max(1, ...months.map(month => {
        const byCat = monthMap.get(month) || new Map();
        return [...byCat.values()].reduce((a, b) => a + b, 0);
      }));

      els.timelineChart.innerHTML = '';
      months.forEach(month => {
        const byCat = monthMap.get(month) || new Map();
        const total = [...byCat.values()].reduce((a, b) => a + b, 0);
        const scaledHeight = total > 0 ? Math.max(4, (total / maxMonthTotal) * 92) : 0;
        const wrap = document.createElement('div');
        wrap.className = 'timeline-month';
        const stack = document.createElement('div');
        stack.className = 'timeline-stack';
        stack.title = `${monthLabel(month)}: ${total}`;
        if (currentMonthIndex >= 0 && availableMonths[currentMonthIndex] === month) {
          stack.style.outline = '2px solid rgba(255,255,255,0.85)';
        }
        if (total > 0) {
          sortedCategories.forEach(category => {
            const value = byCat.get(category) || 0;
            if (!value) return;
            const segment = document.createElement('div');
            segment.className = 'timeline-segment';
            segment.style.height = `${(value / total) * scaledHeight}px`;
            segment.style.background = categoryColor(category);
            segment.title = `${monthLabel(month)} · ${category}: ${value}`;
            stack.appendChild(segment);
          });
        }
        const label = document.createElement('span');
        label.textContent = month;
        label.title = monthLabel(month);
        wrap.appendChild(stack);
        wrap.appendChild(label);
        els.timelineChart.appendChild(wrap);
      });
    }

    function updateDashboard() {
      const extent = map.getView().calculateExtent(map.getSize());
      const inExtent = filteredFeatures.filter(f => ol.extent.containsCoordinate(extent, f.getGeometry().getCoordinates()));
      const records = inExtent.map(f => f.getProperties());
      const neighborhoodsInStats = getUnique(records.map(r => r.cartiere).filter(v => v && v !== 'N/A')).length;

      els.visibleCount.textContent = String(records.length);
      els.visibleCategories.textContent = String(getUnique(records.map(r => r.category)).length);
      els.visibleMonths.textContent = String(getUnique(records.map(r => r.monthKey)).filter(v => v && v !== 'Unknown').length);
      els.visibleNeighborhoods.textContent = String(neighborhoodsInStats);
      renderStats(records, 'category', els.categoryStats, 6);
      renderTimeline(records);
    }

    function updateTimeLabel() {
      els.timeLabel.textContent = currentMonthIndex >= 0 ? `Până la ${monthLabel(availableMonths[currentMonthIndex])}` : 'Toate lunile din intervalul selectat';
    }

    function fitToVisible() {
      if (currentViewMode === 'cartiere') {
        const extent = neighborhoodSource.getExtent();
        if (extent && !ol.extent.isEmpty(extent)) {
          map.getView().fit(extent, { padding: [50, 50, 50, 50], duration: 400, maxZoom: 14 });
        }
        return;
      }
      const extent = visibleSource.getExtent();
      if (extent && !ol.extent.isEmpty(extent)) {
        map.getView().fit(extent, { padding: [50, 50, 50, 50], duration: 400, maxZoom: 16 });
      }
    }

    function setViewMode(mode) {
      currentViewMode = mode;
      clustersLayer.setVisible(mode === 'clusters');
      heatmapLayer.setVisible(mode === 'heatmap');
      choroplethLayer.setVisible(mode === 'cartiere');
      neighborhoodOutlineLayer.setVisible(mode !== 'cartiere');
      document.querySelectorAll('.view-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === mode));
      renderLegend();
      choroplethLayer.changed();
      neighborhoodOutlineLayer.changed();
      if (mode !== 'cartiere') closePopup();
    }

    function setData(records) {
      rawRecords = records.map(normalizeRecord).filter(Boolean);
      populateFilters();
      refreshMapData();
      fitToVisible();
    }

    function stopPlaying() {
      if (playTimer) clearInterval(playTimer);
      playTimer = null;
      els.playBtn.textContent = 'Play';
    }

    document.querySelectorAll('.view-btn').forEach(btn => btn.addEventListener('click', () => setViewMode(btn.dataset.view)));
    [els.fromDate, els.toDate].forEach(el => el.addEventListener('change', refreshMapData));
    els.categoryFilter.addEventListener('change', () => {
      Object.keys(clusterStyleCache).forEach(k => delete clusterStyleCache[k]);
      refreshMapData();
    });
    els.timeSlider.addEventListener('input', () => {
      currentMonthIndex = Number(els.timeSlider.value);
      updateTimeLabel();
      refreshMapData();
    });
    els.resetTimelineBtn.addEventListener('click', () => {
      currentMonthIndex = -1;
      els.timeSlider.value = '0';
      updateTimeLabel();
      refreshMapData();
      stopPlaying();
    });
    els.fitBtn.addEventListener('click', fitToVisible);
    els.playBtn.addEventListener('click', () => {
      if (playTimer) {
        stopPlaying();
        return;
      }
      if (!availableMonths.length) return;
      if (currentMonthIndex < 0) currentMonthIndex = 0;
      els.timeSlider.value = String(currentMonthIndex);
      updateTimeLabel();
      refreshMapData();
      els.playBtn.textContent = 'Pause';
      playTimer = setInterval(() => {
        currentMonthIndex += 1;
        if (currentMonthIndex >= availableMonths.length) {
          stopPlaying();
          return;
        }
        els.timeSlider.value = String(currentMonthIndex);
        updateTimeLabel();
        refreshMapData();
      }, 900);
    });
    els.legendToggleBtn.addEventListener('click', () => {
      const hidden = els.mapLegend.classList.toggle('hidden');
      els.legendToggleBtn.textContent = hidden ? 'Arată legenda' : 'Ascunde legenda';
    });

    map.on('singleclick', evt => {
      if (currentViewMode !== 'cartiere') return;
      let hitFeature = null;
      map.forEachFeatureAtPixel(evt.pixel, (feature, layer) => {
        if (layer === choroplethLayer) {
          hitFeature = feature;
          return true;
        }
        return false;
      });

      if (!hitFeature) {
        closePopup();
        return;
      }

      const neighborhood = getNeighborhoodName(hitFeature.getProperties());
      if (!neighborhood || !neighborhoodStatsMap.has(neighborhood)) {
        closePopup();
        return;
      }

      selectedNeighborhoodName = neighborhood;
      popupEl.innerHTML = formatPopup(neighborhood);
      popupEl.style.display = 'block';
      popupOverlay.setPosition(evt.coordinate);
      choroplethLayer.changed();
      neighborhoodOutlineLayer.changed();
    });

    async function loadComplaints() {
      const response = await fetch('./complaints_2025.geojson');
      if (!response.ok) throw new Error(`Failed to load complaints_2025.geojson (${response.status})`);
      const data = await response.json();
      if (data.type === 'FeatureCollection' && Array.isArray(data.features)) {
        const records = data.features.map(f => {
          const coords = f.geometry?.type === 'Point' ? f.geometry.coordinates : null;
          return { ...(f.properties || {}), longitude: coords?.[0], latitude: coords?.[1] };
        });
        setData(records);
        return;
      }
      throw new Error('Expected a Point FeatureCollection in complaints_2025.geojson');
    }

    async function loadNeighborhoods() {
      try {
        const response = await fetch('./cartiere_cluj_.geojson');
        if (!response.ok) return;
        const data = await response.json();
        const format = new ol.format.GeoJSON();
        const features = format.readFeatures(data, { dataProjection: 'EPSG:4326', featureProjection: 'EPSG:3857' });
        neighborhoodSource.clear();
        neighborhoodSource.addFeatures(features);
      } catch (err) {
        console.warn('Could not load cartiere_cluj_.geojson', err);
      }
    }

    Promise.allSettled([loadNeighborhoods(), loadComplaints()]).then(results => {
      const complaintsResult = results[1];
      if (complaintsResult.status === 'rejected') {
        console.error(complaintsResult.reason);
        alert(complaintsResult.reason.message || String(complaintsResult.reason));
      }
    });
  </script>
</body>
</html>
